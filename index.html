<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENJO GENERATOR v19 - Web Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/pyodide@0.24.1/pyodide.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    hijau: '#00FF41',
                    gelap: '#0A0A0A',
                    abu: '#1A1A1A',
                    merah: '#FF2E2E'
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        body { background: #0A0A0A; color: #00FF41; font-family: 'Courier New', monospace; }
        .terminal { background: #0F0F0F; border: 2px solid #00FF41; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .kursor { animation: kedip 1s infinite; }
        @keyframes kedip { 50% { opacity: 0; } }
        .scroll-hijau::-webkit-scrollbar { width: 6px; }
        .scroll-hijau::-webkit-scrollbar-thumb { background: #00FF41; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">
    <div class="max-w-5xl mx-auto">
        <!-- HEADER -->
        <div class="text-center mb-6">
            <h1 class="text-[clamp(24px,6vw,48px)] font-bold text-hijau mb-2">
                <i class="fa fa-terminal mr-3"></i>KENJO GENERATOR v19
            </h1>
            <p class="text-green-400 text-lg">TROYTALE EDITION ‚ÄĘ SPEED STABILIZER ‚ÄĘ WEB BROWSER</p>
        </div>

        <!-- TERMINAL UTAMA -->
        <div class="terminal rounded-2xl p-4 md:p-6 mb-6">
            <div id="output" class="h-[60vh] overflow-y-auto scroll-hijau p-4 text-lg leading-relaxed"></div>
            <div class="flex items-center mt-4 border-t border-hijau/30 pt-4">
                <span class="text-hijau mr-2">root@kenjo:~#</span>
                <input type="text" id="cmd" class="flex-1 bg-transparent outline-none text-hijau text-lg" placeholder="Ketik perintah...">
                <span class="kursor text-hijau text-2xl">‚ĖĆ</span>
            </div>
        </div>

        <!-- TOMBOL KONTROL -->
        <div class="grid md:grid-cols-3 gap-4 mb-6">
            <button onclick="jalankanScript()" class="py-4 bg-hijau/20 hover:bg-hijau/40 border-2 border-hijau rounded-xl font-bold text-xl text-hijau transition-all">
                <i class="fa fa-play mr-2"></i> JALANKAN GENERATOR
            </button>
            <button onclick="bersihkanLayar()" class="py-4 bg-abu/50 hover:bg-abu border-2 border-gray-500 rounded-xl font-bold text-xl text-gray-300 transition-all">
                <i class="fa fa-trash mr-2"></i> BERSIHKAN LAYAR
            </button>
            <button onclick="hentikanProses()" class="py-4 bg-merah/20 hover:bg-merah/40 border-2 border-merah rounded-xl font-bold text-xl text-merah transition-all">
                <i class="fa fa-stop mr-2"></i> HENTIKAN
            </button>
        </div>

        <!-- STATUS -->
        <div class="bg-abu/50 border border-hijau/30 rounded-xl p-4 text-center">
            <span class="text-gray-400">Status: </span>
            <span id="status" class="text-yellow-400 font-bold">Siap. Klik "Jalankan Generator" untuk memulai.</span>
        </div>
    </div>

    <script>
        let pyodide = null;
        let prosesBerjalan = false;

        // Inisialisasi Pyodide
        async function initPyodide() {
            const status = document.getElementById('status');
            status.textContent = "Memuat Mesin Python... Mohon tunggu...";
            try {
                pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/npm/pyodide@0.24.1/"
                });
                await pyodide.loadPackage(['micropip']);
                status.textContent = "‚úÖ Siap! Klik Jalankan Generator.";
            } catch (err) {
                status.textContent = "‚ĚĆ Gagal memuat Python: " + err.message;
            }
        }

        // Cetak ke Terminal
        function cetak(teks) {
            const out = document.getElementById('output');
            out.innerHTML += teks.replace(/\n/g, '<br>');
            out.scrollTop = out.scrollHeight;
        }

        function bersihkanLayar() {
            document.getElementById('output').innerHTML = '';
        }

        // Kode Python Asli (Diadaptasi untuk Web)
        const kodePython = `
import random
import string
import time
import re
from datetime import datetime

# ==============================================
# WARNA & BANNER
# ==============================================
R = "\\033[91m"
G = "\\033[92m"
Y = "\\033[93m"
B = "\\033[94m"
P = "\\033[95m"
C = "\\033[96m"
W = "\\033[97m"
RE = "\\033[0m"
BLD = "\\033[1m"
M = "\\033[38;5;208m"

BORDER = f"{C}{BLD}"
WATERMARK = "RASYAH TEAM"

KENJO_ART = f"""
{R}{BLD}
 ‚Ėą‚Ėą‚Ėď ‚Ėą‚Ėą‚Ėą‚ĖĄ    ‚Ėą  ‚Ėą‚Ėą ‚ĖĄ‚Ėą‚ĖÄ  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą ‚Ėí‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą  ‚Ėí‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą   ‚Ėą‚Ėą‚Ėď
‚Ėď‚Ėą‚Ėą‚Ėí ‚Ėą‚Ėą ‚ĖÄ‚Ėą   ‚Ėą  ‚Ėą‚Ėą‚ĖĄ‚Ėą‚Ėí ‚Ėí‚Ėą‚Ėą    ‚Ėí ‚Ėí‚Ėą‚Ėą‚Ėí  ‚Ėą‚Ėą‚Ėí‚Ėí‚Ėą‚Ėą‚Ėí  ‚Ėą‚Ėą‚Ėí‚Ėď‚Ėą‚Ėą‚Ėí
‚Ėí‚Ėą‚Ėą‚Ėí‚Ėď‚Ėą‚Ėą  ‚ĖÄ‚Ėą ‚Ėą‚Ėą‚Ėí‚Ėď‚Ėą‚Ėą‚Ėą‚ĖĄ‚ĖĎ ‚ĖĎ ‚Ėď‚Ėą‚Ėą‚ĖĄ   ‚Ėí‚Ėą‚Ėą‚ĖĎ  ‚Ėą‚Ėą‚Ėí‚Ėí‚Ėą‚Ėą‚ĖĎ  ‚Ėą‚Ėą‚Ėí‚Ėí‚Ėą‚Ėą‚Ėí
‚ĖĎ‚Ėą‚Ėą‚ĖĎ‚Ėď‚Ėą‚Ėą‚Ėí  ‚Ėź‚ĖĆ‚Ėą‚Ėą‚Ėí‚Ėď‚Ėą‚Ėą ‚Ėą‚ĖĄ   ‚Ėí   ‚Ėą‚Ėą‚Ėí‚Ėí‚Ėą‚Ėą   ‚Ėą‚Ėą‚ĖĎ‚Ėí‚Ėą‚Ėą   ‚Ėą‚Ėą‚ĖĎ‚ĖĎ‚Ėą‚Ėą‚ĖĎ
‚ĖĎ‚Ėą‚Ėą‚ĖĎ‚Ėí‚Ėą‚Ėą‚ĖĎ   ‚Ėď‚Ėą‚Ėą‚ĖĎ‚Ėí‚Ėą‚Ėą‚Ėí ‚Ėą‚ĖĄ‚Ėí‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėí‚Ėí‚ĖĎ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėď‚Ėí‚ĖĎ‚ĖĎ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėď‚Ėí‚ĖĎ‚ĖĎ‚Ėą‚Ėą‚ĖĎ
‚ĖĎ‚Ėď  ‚ĖĎ ‚Ėí‚ĖĎ   ‚Ėí ‚Ėí ‚Ėí ‚Ėí‚Ėí ‚Ėď‚Ėí‚Ėí ‚Ėí‚Ėď‚Ėí ‚Ėí ‚ĖĎ‚ĖĎ ‚Ėí‚ĖĎ‚Ėí‚ĖĎ‚Ėí‚ĖĎ ‚ĖĎ ‚Ėí‚ĖĎ‚Ėí‚ĖĎ‚Ėí‚ĖĎ ‚ĖĎ‚Ėď 
 ‚Ėí ‚ĖĎ‚ĖĎ ‚ĖĎ‚ĖĎ   ‚ĖĎ ‚Ėí‚ĖĎ‚ĖĎ ‚ĖĎ‚Ėí ‚Ėí‚ĖĎ‚ĖĎ ‚ĖĎ‚Ėí  ‚ĖĎ ‚ĖĎ  ‚ĖĎ ‚Ėí ‚Ėí‚ĖĎ   ‚ĖĎ ‚Ėí ‚Ėí‚ĖĎ  ‚Ėí ‚ĖĎ
 ‚Ėí ‚ĖĎ   ‚ĖĎ   ‚ĖĎ ‚ĖĎ ‚ĖĎ ‚ĖĎ‚ĖĎ ‚ĖĎ ‚ĖĎ  ‚ĖĎ  ‚ĖĎ  ‚ĖĎ ‚ĖĎ ‚ĖĎ ‚Ėí  ‚ĖĎ ‚ĖĎ ‚ĖĎ ‚Ėí   ‚Ėí ‚ĖĎ
 ‚ĖĎ         ‚ĖĎ   ‚ĖĎ  ‚ĖĎ‚ĖĎ ‚ĖĎ       ‚ĖĎ      ‚ĖĎ ‚ĖĎ      ‚ĖĎ ‚ĖĎ   ‚ĖĎ 
{RE}
"""

def print_banner():
    print(KENJO_ART)
    print(f"{BORDER}{'='*78}{RE}")
    print(f"{BORDER}{G}KENJO GENERATOR - TROYTALE EDITION{RE}")
    print(f"{BORDER}{Y}Versi: 4.2 | Mode: Web Browser{RE}")
    print(f"{BORDER}{P}Dibuat oleh: KENJO TEAM | {WATERMARK}{RE}")
    print(f"{BORDER}{'='*78}{RE}\\n")

# ==============================================
# KONFIGURASI
# ==============================================
class Config:
    HEX_KEY = "2ee44819e9b4598845141067b281621874d0d5d7af9d8f7e00c1e54715b7d1e3"
    MAX_RETRIES = 1
    TIMEOUT = 5
    POOL_SIZE = 100
    BASE_FOLDER = "KENJO-GENERATOR"
    RARITY_THRESHOLD = 3
    MAX_GENERATE = 50000

# ==============================================
# FUNGSI GENERASI & DETEKSI
# ==============================================
def gen_name():
    prefix = "KENJO"
    chars = string.ascii_uppercase + string.digits
    return f"{prefix}{''.join(random.choices(chars, k=6))}"

def gen_pwd():
    return f"KENJO@{random.randint(100000,999999)}"

PATTERNS = [
    (re.compile(r"(111|222|333|444|555|666|777|888|999|000)"), 3),
    (re.compile(r"(1111|2222|3333|4444|5555|6666|7777|8888|9999|0000)"), 5),
    (re.compile(r"(11111|22222|33333|44444|55555|66666|77777|88888|99999|00000)"), 7),
    (re.compile(r"(1111111|2222222|3333333|4444444|5555555|6666666|7777777|8888888|9999999|0000000)"), 10),
]

def detect_score(aid):
    if not aid or aid == "N/A":
        return 0
    s = str(aid)
    best = 0
    for pattern, score in PATTERNS:
        if pattern.search(s):
            best = max(best, score)
    length = len(s)
    if length <=5: best = max(best,8)
    elif length <=6: best = max(best,6)
    elif length <=7: best = max(best,4)
    return best

def get_tier(score):
    if score >=9: return "LEGEND"
    elif score >=7: return "HIGH"
    elif score >=5: return "MEDIUM"
    elif score >= Config.RARITY_THRESHOLD: return "LOW"
    return "NORMAL"

# ==============================================
# PROSES UTAMA
# ==============================================
def main():
    print_banner()
    print(f"{Y}[‚Ćõ] Memulai Generator ID...{RE}\\n")
    total = 0
    normal = 0
    low = 0
    medium = 0
    high = 0
    legend = 0
    mulai = time.time()

    try:
        for i in range(Config.MAX_GENERATE):
            if not proses_berjalan:
                print(f"\\n{R}[‚ŹĻÔłŹ] Proses dihentikan oleh pengguna.{RE}")
                break
            aid = random.randint(10000000, 999999999)
            nama = gen_name()
            sandi = gen_pwd()
            skor = detect_score(aid)
            tier = get_tier(skor)
            total +=1

            if tier == "NORMAL":
                normal +=1
                print(f"{W}[‚ĄĻÔłŹ] ID: {aid:10d} | Nama: {nama:12s} | Tier: {tier:6s}{RE}")
            elif tier == "LOW":
                low +=1
                print(f"{G}[ūüíé] ID: {aid:10d} | Nama: {nama:12s} | Tier: {tier:6s} | Skor: {skor}{RE}")
            elif tier == "MEDIUM":
                medium +=1
                print(f"{B}[ūüíéūüíé] ID: {aid:10d} | Nama: {nama:12s} | Tier: {tier:6s} | Skor: {skor}{RE}")
            elif tier == "HIGH":
                high +=1
                print(f"{Y}[ūüíéūüíéūüíé] ID: {aid:10d} | Nama: {nama:12s} | Tier: {tier:6s} | Skor: {skor}{RE}")
            elif tier == "LEGEND":
                legend +=1
                print(f"{R}{BLD}[ūüĎĎ LEGEND] ID: {aid:10d} | Nama: {nama:12s} | Pass: {sandi:15s} | Skor: {skor}{RE}")

            if total % 50 ==0:
                kecepatan = round(total/(time.time()-mulai),2)
                print(f"\\n{C}[ūüďä] Statistik: Total={total} | Normal={normal} | Rare={low+medium+high+legend} | Kecepatan={kecepatan} ID/detik{RE}\\n")

    except Exception as e:
        print(f"\\n{R}[‚ĚĆ] Error: {str(e)}{RE}")
    finally:
        durasi = round(time.time()-mulai,2)
        print(f"\\n{'='*78}")
        print(f"{G}[‚úÖ] SELESAI! Hasil Akhir:{RE}")
        print(f"{W}‚ÄĘ Total ID Dibuat   : {total:,}{RE}")
        print(f"{W}‚ÄĘ Normal           : {normal:,}{RE}")
        print(f"{G}‚ÄĘ Low Rare         : {low:,}{RE}")
        print(f"{B}‚ÄĘ Medium Rare      : {medium:,}{RE}")
        print(f"{Y}‚ÄĘ High Rare        : {high:,}{RE}")
        print(f"{R}‚ÄĘ Legend Rare      : {legend:,}{RE}")
        print(f"{C}‚ÄĘ Durasi           : {durasi} detik{RE}")
        print(f"{C}‚ÄĘ Rata-rata        : {round(total/durasi,2)} ID/detik{RE}")
        print(f"{'='*78}\\n")

proses_berjalan = True
main()
`;

        // Jalankan Script
        async function jalankanScript() {
            if (!pyodide) { alert("Tunggu hingga mesin Python selesai dimuat!"); return; }
            if (prosesBerjalan) { alert("Generator sedang berjalan!"); return; }
            
            bersihkanLayar();
            prosesBerjalan = true;
            document.getElementById('status').textContent = "ūüĒĄ Sedang berjalan...";
            
            try {
                pyodide.globals.set('proses_berjalan', true);
                pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = buffer = StringIO()
`);
                await pyodide.runPythonAsync(kodePython);
                const hasil = pyodide.runPython('buffer.getvalue()');
                cetak(hasil.replace(/\033\[(\d+;?)+m/g, ''));
            } catch (err) {
                cetak(`\\n‚ĚĆ Kesalahan: ${err}\\n`);
            } finally {
                prosesBerjalan = false;
                document.getElementById('status').textContent = "‚úÖ Selesai. Siap lagi.";
            }
        }

        function hentikanProses() {
            if (pyodide) pyodide.globals.set('proses_berjalan', false);
            prosesBerjalan = false;
            document.getElementById('status').textContent = "‚ŹĻÔłŹ Dihentikan.";
        }

        // Mulai Inisialisasi
        initPyodide();

        // Input Perintah
        document.getElementById('cmd').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const perintah = this.value.trim().toLowerCase();
                cetak(`<br>root@kenjo:~# ${perintah}<br>`);
                this.value = '';
                if (perintah === 'start' || perintah === 'run') jalankanScript();
                else if (perintah === 'clear') bersihkanLayar();
                else if (perintah === 'stop') hentikanProses();
                else cetak(`Perintah tidak dikenal. Gunakan: start | clear | stop<br>`);
            }
        });
    </script>
</body>
</html>
