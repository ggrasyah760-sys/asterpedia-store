<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAESTU UID • Guild</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        guild: {
                            yellow: '#FFD100',
                            black: '#121212',
                            holo1: '#FF00FF',
                            holo2: '#00FFFF',
                            holo3: '#FFD700',
                            holo4: '#FF4500'
                        }
                    },
                    fontFamily: {
                        guild: ['Orbitron', 'Rajdhani', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap');

        body {
            margin: 0;
            min-height: 100vh;
            /* Background Holo Berkilau */
            background: linear-gradient(45deg, 
                rgba(255, 0, 255, 0.7), 
                rgba(0, 255, 255, 0.7), 
                rgba(255, 215, 0, 0.7), 
                rgba(255, 69, 0, 0.7));
            background-size: 400% 400%;
            animation: holoBg 12s ease infinite;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes holoBg {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }

        .logo-box {
            width: clamp(280px, 60vw, 450px);
            height: clamp(280px, 60vw, 450px);
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            border: 4px solid #FFD100;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 30px rgba(255, 209, 0, 0.8),
                inset 0 0 20px rgba(255, 209, 0, 0.4);
            transition: all 0.5s ease;
        }

        .logo-box:hover {
            transform: scale(1.05);
            box-shadow: 
                0 0 50px rgba(255, 209, 0, 1),
                inset 0 0 30px rgba(255, 209, 0, 0.6);
        }

        .logo-img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .guild-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            color: #FFD100;
            text-shadow: 
                0 0 15px #FFD100,
                0 0 30px #FFD100,
                4px 4px 8px rgba(0,0,0,0.8);
            margin-bottom: 3rem;
            letter-spacing: 4px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { filter: brightness(1); }
            to { filter: brightness(1.4); }
        }
    </style>
</head>
<body>

    <!-- JUDUL GUILD DI ATAS -->
    <h1 class="guild-title">SAESTU UID</h1>

    <!-- LOGO DALAM KOTAK DI TENGAH -->
    <div class="logo-box">
        <img src="https://i.imgur.com/7Z7s9QH.png" alt="Logo SAESTU UID" class="logo-img">
    </div>

</body>
</html>
