<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKT48 • Foto Tanpa Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { jkt48: { red: '#E60012', pink: '#FF4D6D' } },
                    fontFamily: { jkt: ['Segoe UI', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(135deg, #E60012, #FF4D6D, #fff); min-height: 100vh; }
        .card { transition: 0.3s; }
        .card:hover { transform: translateY(-6px); box-shadow: 0 10px 25px rgba(230,0,18,0.3); }
        .img-jkt { object-fit: cover; border: 4px solid white; }
        .img-error { background: #f1f1f1; display: flex; align-items: center; justify-content: center; color: #888; }
    </style>
</head>
<body class="font-jkt py-8 px-4">
    <div class="container mx-auto max-w-6xl">
        <h1 class="text-center text-white text-[clamp(2rem,5vw,3.5rem)] font-bold mb-10 drop-shadow-lg">
            <i class="fa fa-heart mr-2"></i>Member JKT48
        </h1>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- FREYA -->
            <div class="card bg-white rounded-2xl overflow-hidden text-center p-4">
                <img src="https://akb48.fandom.com/wiki/Freya_Jayawardana?file=Freya_Jayawardana_2024.jpg"
                     alt="Freya Jayawardana" class="w-full h-64 img-jkt rounded-xl mb-3"
                     onerror="this.onerror=null;this.src='https://via.placeholder.com/300x400?text=Freya+JKT48';this.classList.add('img-error');">
                <h3 class="font-bold text-xl text-jkt48-red">Freya Jayawardana</h3>
                <p class="text-gray-600">Kapten JKT48</p>
            </div>

            <!-- CHRISTY -->
            <div class="card bg-white rounded-2xl overflow-hidden text-center p-4">
                <img src="https://akb48.fandom.com/wiki/Angelina_Christy?file=Angelina_Christy_2024.jpg"
                     alt="Angelina Christy" class="w-full h-64 img-jkt rounded-xl mb-3"
                     onerror="this.onerror=null;this.src='https://via.placeholder.com/300x400?text=Christy+JKT48';this.classList.add('img-error');">
                <h3 class="font-bold text-xl text-jkt48-red">Angelina Christy</h3>
                <p class="text-gray-600">Member Aktif</p>
            </div>

            <!-- MARSHA -->
            <div class="card bg-white rounded-2xl overflow-hidden text-center p-4">
                <img src="https://akb48.fandom.com/wiki/Marsha_Lenathea?file=Marsha_Lenathea_2024.jpg"
                     alt="Marsha Lenathea" class="w-full h-64 img-jkt rounded-xl mb-3"
                     onerror="this.onerror=null;this.src='https://via.placeholder.com/300x400?text=Marsha+JKT48';this.classList.add('img-error');">
                <h3 class="font-bold text-xl text-jkt48-red">Marsha Lenathea</h3>
                <p class="text-gray-600">Member Aktif</p>
            </div>

            <!-- MUTHE -->
            <div class="card bg-white rounded-2xl overflow-hidden text-center p-4">
                <img src="https://akb48.fandom.com/wiki/Mutiara_Azzahra?file=Mutiara_Azzahra_2024.jpg"
                     alt="Mutiara Azzahra" class="w-full h-64 img-jkt rounded-xl mb-3"
                     onerror="this.onerror=null;this.src='https://via.placeholder.com/300x400?text=Muthe+JKT48';this.classList.add('img-error');">
                <h3 class="font-bold text-xl text-jkt48-red">Mutiara Azzahra</h3>
                <p class="text-gray-600">Member Aktif</p>
            </div>

            <!-- ONIEL -->
            <div class="card bg-white rounded-2xl overflow-hidden text-center p-4">
                <img src="https://akb48.fandom.com/wiki/Cornelia_Vanisa?file=Cornelia_Vanisa_2024.jpg"
                     alt="Cornelia Vanisa" class="w-full h-64 img-jkt rounded-xl mb-3"
                     onerror="this.onerror=null;this.src='https://via.placeholder.com/300x400?text=Oniel+JKT48';this.classList.add('img-error');">
                <h3 class="font-bold text-xl text-jkt48-red">Cornelia Vanisa</h3>
                <p class="text-gray-600">Member Aktif</p>
            </div>

            <!-- ZEE -->
            <div class="card bg-white rounded-2xl overflow-hidden text-center p-4">
                <img src="https://akb48.fandom.com/wiki/Azizi_Shafaa_Asadel?file=Azizi_Shafaa_Asadel_2023.jpg"
                     alt="Azizi Shafaa Asadel" class="w-full h-64 img-jkt rounded-xl mb-3"
                     onerror="this.onerror=null;this.src='https://via.placeholder.com/300x400?text=Zee+JKT48';this.classList.add('img-error');">
                <h3 class="font-bold text-xl text-jkt48-red">Azizi S. Asadel</h3>
                <p class="text-gray-600">Sudah Lulus</p>
            </div>
        </div>
    </div>
</body>
                    </html>
